id: C-002
statement: |
  Discrete-vs-continuous wall: no algebraic-geometric moduli of
  circuits is simultaneously (a) positive-dimensional and (b)
  faithful to Boolean hardness. Every encoding faithful to Boolean
  (or monotone-Boolean) complexity is 0-dimensional (rigid); every
  positive-dimensional encoding is hardness-blind. Generalizes
  C-001 across Boolean, arithmetic, and monotone encodings.
