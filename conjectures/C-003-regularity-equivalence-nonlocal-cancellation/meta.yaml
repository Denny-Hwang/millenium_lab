# conjecture meta — follows schemas/conjecture-meta.schema.yaml.
id: C-003
statement: |
  No proof of the conditional implication "u in L^∞_t BMO^{-1} on
  [0, T) implies u in L^∞_t L^q on [0, T) for some q in (3, 6]"
  for smooth 3D incompressible Navier-Stokes solutions from CMI
  initial data simultaneously (a) passes the Tao-barrier audit
  (uses the divergence-free condition essentially, in a way
  averaged NSE cannot replicate), AND (b) reduces to estimates
  that are local in Littlewood-Paley / Bony frequency
  decomposition. Equivalently: the global-in-frequency div-free
  cancellation and the local-per-frequency-block estimates
  required for BMO^{-1} → L^q control are structurally
  incompatible.
parent_problem: 05-navier-stokes
