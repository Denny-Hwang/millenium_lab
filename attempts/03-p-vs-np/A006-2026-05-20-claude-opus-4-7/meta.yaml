  Concrete computation. Discharge A005's G010 by writing the
  explicit Plücker equations of the L02 v2 Grassmannian-product
  construction at the smallest non-trivial case (n, s, d) = (2, 3,
  2). Enumerate the DAG topologies (three classes T1, T2, T3),
  identify each Grassmannian factor, and cut out the Boolean-
  evaluation locus inside each ambient. Compute the dimension of
  the Boolean locus and compare to the ambient dimension. Use the
  result to supply direct evidence on G009 (the discrete-reading
  collapse of A005): does the construction's positive-dimensional
  ambient rescue the program, or does the Boolean restriction
  re-introduce 0-dimensionality? If the latter, make the two
  available strategic escapes explicit (sheaf-on-ambient
  interpretation R1; pivot to arithmetic / GCT moduli R2). Out of
  scope: full GL_n-equivariance check (only S_n is straightforward
  in this construction); larger cases requiring computer algebra
  (Macaulay2 / SageMath unavailable in this container).
