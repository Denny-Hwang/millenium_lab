  - "Discrimination does exist at richer invariants: A' at T3 gives an irreducible (1,1) curve for XOR vs a reducible (1,1) curve for x_1 AND x_2; A'' at T3 has nontrivial Ext^2 = Q^4 supporting f-dependent classes. The H_AC^0 program's natural target invariant may be Ext^k for k matching ambient dimension, not Ext^1 as A002 L05 framed it."
  - "G015 (lethal-if-unresolved): A002 L05's H^1 framing is dimension-1-specific; in 2-dim ambient the right cohomological degree is Ext^2. L05 (and consequently L06, L10, B-002) needs restating with k-dependent cohomological degree."
  - "G016 (major): if discrimination uses divisor-component invariants rather than Picard classes, the natural-proofs framework (targeting coherent-sheaf cohomology) does not automatically engage. A separate analysis of Razborov-Rudich applicability to richer-invariant escapes is required."
  - "Abandonment trigger NOT activated: the failures are at the wrong cohomological degree, not at the route level. A009 should test the Ext^2 / richer-invariant variant; if that also fails to produce a discriminating coherent-sheaf class in any degree, then (R2) abandonment is triggered."
