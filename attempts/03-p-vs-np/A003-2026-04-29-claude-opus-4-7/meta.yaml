strategy: |
  Adversarial scoping review (P07 variant) of A002's 14-lemma
  scaffold for H_AC⁰. P07 normally targets a candidate; A002
  recommends HOLD on candidate promotion, so this attempt instead
  performs an attempt-level adversarial review with full transparency
