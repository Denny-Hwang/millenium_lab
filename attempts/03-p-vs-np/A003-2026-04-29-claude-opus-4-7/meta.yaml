key_insights:
  - "L11 (natural-proofs barrier audit) is at lethal risk: under truth-table evaluation, deciding [F_AC⁰]_f ≠ 0 is itself decidable in 2^{O(n)} time, which trivially satisfies Razborov-Rudich constructiveness — making L11 false as stated."
  - "A new lemma L11' (quantitative non-evaluation of F_AC⁰ from short program descriptions) is the rate-limiting open problem for the entire H_0 program."
  - "H_AC⁰'s quantifier on (s, d) was implicit and ambiguous; the intended uniform reading (∃ s = poly(n), d = O(1) ∀ f) must be made explicit, otherwise existential-pointwise reading makes H_AC⁰ trivially true."
  - "Domain swap to AC⁰[2] does NOT over-prove: L02 moduli is gate-set-specific, so the scaffold is honest about what it claims."
  - "Single-model adversarial review surfaces concrete patches missed by the original author; genuine cross-model rounds remain required for any L4 verdict."
