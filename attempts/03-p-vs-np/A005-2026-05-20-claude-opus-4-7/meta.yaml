strategy: |
  Patch-only attempt against A002 L02. Discharge A003-A1
  (quasi-projectivity) by giving an explicit Grassmannian-product
  construction of the AC^0 circuit moduli — closed subscheme of a
  product of Grassmannians of wiring choices, cut out by polynomial
  Boolean-evaluation equations, quotiented by finite-group
  gate-relabeling. Address A003-A2 (irreducibility) by acknowledging
  that the moduli decomposes into irreducible components indexed by
  DAG topologies, that GL_n preserves but does not transitively
  permute the components, and that component-uniformity-of-eval (the
  patch A003 suggested) is false; the available patch is
  Boolean-output-uniformity of the Čech 1-cocycle, which is a
  subordinate open statement. Surface the structural tension that
  the naive discrete reading of L02 makes H^1 vanish identically
  and collapses the H_AC^0 program — recorded as new gap G009 with
  lethal-if-unresolved severity. Out of scope: the explicit Plücker
  equations (deferred); the GL_n-equivariance verification at the
  closed-subscheme level; the full L11' attack (originally A005 in
  A004's follow-up, now reassigned because sequential ID assignment
  placed the L02 patch work at A005).
