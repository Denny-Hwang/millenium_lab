key_insights:
  - "The naive discrete reading of L02 v1 makes H^1(C, F) = 0 identically (0-dim affine + Hartshorne III.3.5) and collapses H_AC^0. Any quasi-projective scheme structure used by the program must be non-discrete — this is a new lethal-grade gap G009 that A002 and A003 did not flag."
  - "L02 v2 is realized as a closed subscheme of a finite product of Grassmannians (the wiring data) cut out by polynomial Boolean-evaluation equations on Plücker coordinates, then quotiented by gate-relabeling. Quasi-projectivity follows from ambient projectivity + closed subscheme + finite-group GIT quotient. A003-A1 is closed at proof-sketch level."
  - "Irreducible components of L02 v2 are indexed by DAG topologies. GL_n preserves each component but does not permute them transitively. A003-A2's suggested patch (component-uniformity of eval) is provably false; the correct replacement is Boolean-output-uniformity of the Čech 1-cocycle, which is itself a subordinate open lemma."
  - "G009 supersedes G001 (A002's original reducibility gap) in importance. The question is no longer 'is the moduli irreducible' but 'does the chosen non-discrete scheme structure support a coherent sheaf with non-vanishing H^1 that tracks AC^0-membership'."
