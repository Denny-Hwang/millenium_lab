key_insights:
  - "GCT-L02 (the (R2) arithmetic-circuit moduli) escapes Boolean rigidity: it is honestly positive-dimensional because edge scalar weights are continuous parameters, so there is no 0-dimensional collapse (the defect that defeated (R1) / C-001)."
  - "But it does NOT track AC^0-membership. XOR's representing polynomial p_XOR = x_1 + x_2 - 2 x_1 x_2 is arithmetic-realizable at size 2 / depth 2, while XOR is Boolean-AC^0-hard at (3,2) (needs >3 Boolean gates per A007). Arithmetic complexity of p_f does not track f's AC^0 complexity."
  - "The two routes face DUAL obstructions: (R1) Boolean moduli -> 0-dim rigidity (C-001); (R2) arithmetic moduli -> hardness-blindness (G019, the Boolean-vs-arithmetic gap). Any algebraic-geometric moduli either keeps Boolean structure (rigid) or relaxes to arithmetic (hardness-blind)."
  - "This is the known algebraic-vs-Boolean complexity gap, rediscovered internally with concrete small-case witnesses on both horns. Honest recommendation: consider moving the H_0 / H_AC^0 program to dormant, with reactivation conditioned on a monotone / bounded-cancellation moduli that escapes both C-001 and G019."
