strategy: |
  Strategic commitment + initial route work along (R1)
  sheaf-on-ambient. First, weigh the A006 (R1) vs (R2) split with
  five explicit reasons and commit provisionally to (R1) (identity
  preservation, bridge alignment to B-002, novelty, Razborov-Rudich
  engagement, negative-result asymmetry). Then propose
  Construction A: F_{AC^0}^A = eval^* I_{N_{(s,d)}}, the pullback
  via the eval morphism of the ideal sheaf of non-AC^0 truth
  tables. Test Construction A at the smallest non-vacuous case
  (n, s, d) = (2, 3, 2), where XOR and XNOR exclude themselves
  from AC^0_{(3,2)} by gate-count arithmetic. Report the
  negative finding (Construction A trivializes — gives zero
  cohomology because the non-AC^0 set is disjoint from each
  topology's eval image, reducing the pullback to the structure
  sheaf, which has H^1 = 0 on rational Grassmannian products).
  Sketch two refinements (A' twisted line bundle; A'' relative
  Ext) as next-attempt targets. Out of scope: rigorous
  construction of A' or A''; larger-case tests (require
  Macaulay2 / SageMath); GL_n-equivariance reconsideration.
