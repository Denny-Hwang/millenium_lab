key_insights:
  - "Strategic commitment to (R1) sheaf-on-ambient is justified by an asymmetry argument: (R1) might fail but failing supplies new evidence about B-002; (R2) succeeds modestly but adds little to the existing GCT literature. Try (R1) first; revisit (R2) as a fallback with explicit negative evidence if (R1) hits an obstacle within 3-5 attempts."
  - "Construction A (F_{AC^0}^A = eval^* I_{N_{(s,d)}}) supplies the right structural shape but gives trivial cohomology at (n, s, d) = (2, 3, 2): the non-AC^0 set N_{(3,2)} = {chi_XOR, chi_XNOR} is disjoint from each topology's eval image, so the pullback degenerates to the structure sheaf with H^1 = 0 on the Grassmannian product."
  - "The (2, 3, 2) test is non-vacuous: XOR and XNOR each require 5 gates after counting NOT as a separate gate, exceeding s = 3. So 2 of 16 Boolean functions on 2 bits are not in AC^0_{(3,2)}, providing the first concrete f not in AC^0_{(s,d)} to test constructions against."
  - "The f-dependence must enter at the sheaf level, not only at the cocycle level. Two refinements proposed for next attempts: A' (twisted line bundle L_f = eval^* O(D_f) for an f-specific divisor D_f, giving c_1(L_f) in H^2); A'' (relative Ext^1(O_B, O_AMB) with f-dependence from restriction to the f-specific Boolean component)."
  - "Naturality is a new lethal-grade constraint (G013): any f-dependent twist must be canonical with respect to the symmetries of the problem; ad-hoc twists do not engage the Razborov-Rudich framework."
