strategy: |
  Test A010's idea (ii): the monotone-arithmetic moduli, the only
  identified candidate that might escape BOTH C-001 (Boolean
  rigidity) and G019 (Boolean-vs-arithmetic gap). State the moduli
  of monotone arithmetic circuits (gates +, x with non-negative
  scalar weights). Test at (2,3,2) whether monotone realizability
  tracks AC^0 / monotone-Boolean complexity, using AND/OR/XOR/NAND
  as witnesses and examining the representation question
  (multilinear-over-Q vs Boolean semiring vs continuous semiring).
  Determine whether the monotone route escapes or reproduces the
  dual obstruction. Out of scope: real-algebraic / o-minimal or
  bounded-cancellation models (speculative, deferred); enacting any
  dormancy decision (user's per charter §3).
