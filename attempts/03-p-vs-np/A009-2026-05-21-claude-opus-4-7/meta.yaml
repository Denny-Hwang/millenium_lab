strategy: |
  Trigger-decisive attempt for A007's (R1) abandonment criterion as
  sharpened by A008. Test the most natural Ext^2-based construction
  at T3 both-fan-in-1 ambient: F_{AC^0}^{A'''} := Ext^2(O_B,
  O_{P^1 x P^1}) ≅ Q^4, with [F]_f the characteristic function of
  "Boolean points realizing f" in the 4-dim class space. Compute
  for four representative Boolean functions: x_1, x_1 AND x_2, x_2
  (in AC^0), and XOR (not in AC^0 per A007). Determine whether
  the construction satisfies A002 L05's biconditional direction
  ([F]_f != 0 iff f not in AC^0). If yes, (R1) survives; if no,
  trigger fires and the program pivots to (R2) GCT-style
  arithmetic moduli. Out of scope: alternative responses
  (biconditional flip; complementary-construction route);
  implementation of the (R2) pivot itself.
