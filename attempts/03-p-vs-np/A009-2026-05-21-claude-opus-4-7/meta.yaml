key_insights:
  - "The Ext^2 construction at T3 discriminates f via [F]_f in Q^4, but with the biconditional direction COMPLETELY INVERTED: [F]_f != 0 iff f IS in AC^0, not iff f is NOT in AC^0. This is structural: cohomology classes naturally supported on the Boolean locus detect realized Boolean functions, not non-realized ones."
  - "Three responses considered: (a) flip the biconditional in L05, but this loses the natural-proofs motivation since Razborov-Rudich is about hard-detection properties not easy-detection; (b) complementary construction on AMB minus B, possibly the right direction but with open f-dependent cocycle assignment; (c) trigger (R2) abandonment. Decision: (c)."
  - "Five consecutive (R1) attempts (A005-A009) have failed to produce a coherent-sheaf class with A002 L05's biconditional direction. The accumulated evidence is sufficient to formalize the (R1) negative finding as a B-002 status revision (downgrade to 'explored-with-negative-findings') and pivot to (R2)."
  - "G017 (new, major): the natural cohomology class supported on the Boolean locus has inverted biconditional direction. G018 (new, lethal-if-unresolved): the (R2) pivot requires a fresh statement of AC^0-membership as a representation-theoretic obstruction in the Mulmuley-Sohoni framework specialized to AC^0; no published formulation exists."
