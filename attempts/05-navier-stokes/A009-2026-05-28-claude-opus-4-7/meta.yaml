strategy: |
  Execute A008's Patch 2 on G_T1b_1. Commit to a specific approach
  (paraproduct-only REJECTED per A008-A6), run statement-level
  Tao-barrier audit on the choice, sketch the proof, identify
  sub-bottlenecks as new gaps. Selected: approach (i) direct L^p
  energy method on u (cleanest expression of ∇·u = 0 cancellation).
  Cross-checked: approach (ii) vorticity L^p energy method.
  Approach (iii) Constantin-Fefferman geometric requires
  direction-Lipschitz as hypothesis — not given by L^∞_t BMO^{-1};
  doesn't apply. Out of scope: A006 Patch 1 (literature audit for
  L_T1a_5 counterexample, deferred to A010); third
