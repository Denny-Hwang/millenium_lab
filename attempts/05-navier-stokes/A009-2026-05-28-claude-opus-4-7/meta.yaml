key_insights:
  - "Selected approach (i) direct L^p energy method on u. Statement-level Tao-barrier audit PASSES: convection term cancels by ∇·u = 0 via integration by parts (∫|u|^{p-2}u·(u·∇u) = -(1/p)∫(∇·u)|u|^p = 0); averaged NSE does NOT have this cancellation."
  - "After convection cancellation, pressure term remains. Calderón-Zygmund + Hölder reduces the closure to needing L^∞_t L^∞_x control on u — NOT given by L^∞_t BMO^{-1}. NEW GAP G_T1b_3 (major-but-not-lethal): derive uniform L^∞_t L^∞_x from L^∞_t BMO^{-1} + smoothness + energy. G_T1b_3 is roughly equivalent in difficulty to closing (A) directly."
  - "Cross-check: approach (ii) vorticity L^p energy method passes statement-level audit symmetrically (vorticity convection cancels by ∇·u = 0), but reduces to vortex stretching obstruction, requiring vorticity-direction Lipschitz (Constantin-Fefferman 1993 hypothesis) NOT given by L^∞_t BMO^{-1}. NEW GAP G_T1b_4 (major-but-not-lethal) symmetric to G_T1b_3."
  - "Cross-approach finding (substantive negative): BOTH non-barrier-blocked direct approaches degenerate — they relocate G_T1b_1 to a regularity-equivalent gap (G_T1b_3 or G_T1b_4) rather than closing it. Structurally similar in spirit to the route-independent wall A011 identified for 03-p-vs-np (conjecture C-002), though here tested on two approaches not all."
  - "A005 trigger does NOT fire: criterion (b) (lemma-graph consistent with audit) was achieved by A007 and remains. But A009 motivates A010 to either find a third approach (paraproduct-with-cancellation hybrid; spectral ladder; Albritton literature) or extract the relocation finding as a permanent asset (analog of C-001)."
follow_ups:
  - "A010: identify a candidate third approach — paraproduct-with-cancellation hybrid; Galerkin/spectral-projection ladder; Albritton 2018+ literature audit (also discharges A006 Patch 1)."
  - "A011 (if A010 fails): extract G_T1b_3 + G_T1b_4 as a formal conjecture C-003 (regularity-equivalence obstruction) — analog of C-001 for the dormant 03-p-vs-np program."
  - "A012 (if A010 + A011 inconclusive): prepare Pivot 1 (route change within α) or Pivot 2 (switch to β)."
  - "Mid-arc R6 (now strongly motivated): 9 attempts on 05-navier-stokes (A001-A009); methodological-contrast R6 with the dormant 03-p-vs-np becomes informative."
  - "Update verification-bar §7 to add a fifth barrier: 'regularity-equivalent reduction' — a proof technique that reduces (A) to an equivalent regularity question is not making progress."
