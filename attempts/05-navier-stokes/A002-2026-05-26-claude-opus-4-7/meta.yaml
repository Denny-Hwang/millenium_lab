key_insights:
  - "The critical-norm ladder for 3D NSE is six steps (Ḣ^{1/2} ⊂ L^3 ⊂ Ḃ^0_{3,q} ⊂ Ḃ^{-1+3/p}_{p,q} ⊂ BMO^{-1} ⊂ Ḃ^{-1}_{∞,∞}), with the Ladyzhenskaya-Prodi-Serrin family (L^q_t L^p_x, 2/q + 3/p = 1) transverse to it. Each step has a known critical-norm theorem (Fujita-Kato; ESS 2003; Cannone-Meyer 1995; Koch-Tataru 2001; Bourgain-Pavlovic 2008)."
  - "ESS 2003 is the keystone bridging theorem: L^∞_t L^3_x bound along smooth flow implies regularity. If we can bound L^∞_t L^3 from all decaying data, CMI (A) is resolved. The single-Φ hypothesis from A001 naturally collapses to 'Φ = L^3' as the operational target."
  - "Koch-Tataru's BMO^{-1} marks the upper edge of currently-tractable critical spaces; above it (Ḃ^{-1}_{∞,∞}) the equation is ill-posed. So the ladder has a meaningful interval (Ḣ^{1/2} through BMO^{-1}) where well-posedness questions live."
  - "A001's C1 refines from 'not equivalent' to 'strictly inclusion-ordered with the open question being WHICH ladder step admits a large-data L^∞_t bound along smooth flows.' The pairwise embedding-along-flow questions form the program's dependency-graph backbone."
follow_ups:
