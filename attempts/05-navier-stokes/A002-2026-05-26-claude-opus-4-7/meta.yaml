id: A002
problem: 05-navier-stokes
date: "2026-05-26"
model: claude-opus-4-7
strategy: |
  Refine A001's hypothesis via P03 lemma-extraction (minor variant).
  A001 panel surfaced C1 (candidate critical Φ's are not equivalent
  norms). This attempt enumerates the strict-inclusion ladder of
  critical norms for 3D NSE (Ḣ^{1/2} ⊂ L^3 ⊂ Ḃ^0_{3,q} ⊂
  Ḃ^{-1+3/p}_{p,q} ⊂ BMO^{-1} ⊂ Ḃ^{-1}_{∞,∞}), attaches the known
  critical-norm theorem at each step (Fujita-Kato, ESS, Cannone-
  Meyer, Koch-Tataru, Bourgain-Pavlovic), notes the Ladyzhenskaya-
  Prodi-Serrin family transverse to the ladder, and lists the open
  pairwise embedding-along-flow questions as the program's
  dependency-graph backbone. The catalog refines C1 from
  "candidates unrelated" to "candidates in a strict-inclusion
  chain; question is which step has a bounded a-priori norm."
  Out of scope: any new theorem, new gap, or new candidate.
