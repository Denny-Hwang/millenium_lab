  - "At each of A014-A015: re-evaluate the Pivot 1 mini-trigger."
  - "Deferred housekeeping (after A015 cleanly): B-003 status → dormant (parallel to B-002 in PR #18); B-004 maturity speculative → ai-discovered; verification-bar.md §7 fifth barrier (global-vs-local cancellation mismatch)."
