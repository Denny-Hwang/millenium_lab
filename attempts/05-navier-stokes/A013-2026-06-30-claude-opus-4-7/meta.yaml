key_insights:
  - "T2 decomposes via discrete → continuum backbone into L_T2_1 (discrete NSE setup, ∇·u = 0 preserved by construction); L_T2_2 (critical-norm compactness, the crux); L_T2_3 (limit identification with continuum NSE); L_T2_4 (norm semi-continuity)."
  - "L_T2_2 sub-decomposes into three approaches: (i) concentration-compactness (Bahouri-Gallagher 1999); (ii) Aubin-Lions (classical); (iii) spectral (LP-block-local). (i) and (ii) are most natural and Tao-barrier compatible at resolution; (iii) needs care."
  - "G_T2_1 (lethal-if-unresolved): establish L_T2_2 critical-norm compactness for discrete-NSE sequences. Comparable to or harder than Gallagher-Iftimie-Planchon 2003 profile decomposition for NSE. G_T2_2 (major): uniform CFD hypothesis sup_k ||u_{Δx_k}||_X ≤ M is empirical, not derived; downstream of T2's role. G_T2_3 (major): discretization scheme choice affects convergence."
  - "Tao-barrier audit: PASS at statement level (∇·u_{Δx} = 0 preserved by construction; limit inherits). Approaches (i), (ii) pass at resolution. C-003-orthogonality: VERIFIED — T2 is a discrete → continuum TRANSFER theorem, NOT a BMO^{-1} → L^q implication. C-003's quantification does not apply to T2. Pivot 1 is on solid structural footing."
  - "A012 mini-trigger criterion (b') ACHIEVED: precise lemma graph + gap labels + Tao-barrier audit + C-003-orthogonality verification. Pivot 1's mini-trigger does NOT fire at A013. First attempt to satisfy a new-route trigger criterion WITHOUT prior wall-like obstructions (contrast favorably with A006-A011 arc on B-003/T1)."
follow_ups:
