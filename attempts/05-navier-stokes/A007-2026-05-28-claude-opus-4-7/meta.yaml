  unique bottleneck L_T1b_3b (auxiliary L^q control from
  L^∞_t BMO^{-1} hypothesis). Identify gap G_T1b_1 (lethal-if-
  unresolved) as the unique technical bottleneck; G_T1b_2 (major)
