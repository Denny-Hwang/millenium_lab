  Leray projector + ∇·u = 0 structurally, so the lemma-statement
  level satisfies the audit; A008 must verify any G_T1b_1
  resolution also preserves this. Goal: satisfy A005 trigger
  criterion (b). Out of scope: a proof attempt on G_T1b_1
  (deferred to A009+); literature audit on Albritton-style
  borderline criteria.
