key_insights:
  - "T1b decomposes via Duhamel into L_T1b_1 (Duhamel formula, trivial for smooth solutions); L_T1b_2 (linear part in L^3, trivial); L_T1b_3 (bilinear, the crux). The Duhamel form uses the Leray projector P and ∇·u=0 explicitly — the Tao-barrier-relevant structure."
  - "L_T1b_3 sub-decomposes into L_T1b_3a (routine time-integral via heat-kernel estimate + Hölder, given an auxiliary L^q control with q ∈ (3,6]) and L_T1b_3b (THE auxiliary L^q control, derived from the L^∞_t BMO^{-1} hypothesis plus smoothness + energy). L_T1b_3a is low-difficulty; L_T1b_3b is the unique bottleneck."
  - "G_T1b_1 (lethal-if-unresolved): establishing L_T1b_3b. Heuristic: BMO^{-1} is the LARGEST critical Banach space; L^q for q > 3 is STRICTLY smaller; so the implication is a regularity strengthening at the critical scale, lacking a known bootstrap mechanism. Albritton-style borderline criteria attack this but have not closed it. G_T1b_2 (major): ESS iteration to close (A) requires uniform-in-T constants."
  - "Tao-barrier audit satisfied at the lemma-statement level: Duhamel uses P + ∇·u = 0 explicitly (pressure cancellation), structural ingredients absent from averaged NSE. Caveat: G_T1b_1's resolution must continue to use these non-trivially; A008 (P07) must verify."
  - "A005 trigger criterion (b) — 'a precise lemma-graph + gap labels for T1b consistent with the Tao-barrier audit' — is ACHIEVED. The pivot trigger does NOT fire. The 05-navier-stokes program continues per the committed (α) route. First attempt to bring the (α) commitment into satisfactory trigger territory."
