  Sketch the paraproduct-with-cancellation hybrid: Bony
  decomposition u·∇u = T_u(∇u) + T_{∇u}(u) + R(u,∇u), examine
  where ∇·u = 0 enters per block. Verdict: does the hybrid escape
  both A008-A6 (paraproduct-only blocked) and A009 (direct
  degeneration)? Honest expected outcome: the hybrid does NOT
  escape — the cancellation is non-local in frequency — and the
  obstruction is intrinsic. Out of scope: any new technique
  beyond surveyed families; the C-003 registration (deferred to
  A011); Pivot selection (deferred to A012).
