$id: https://millennium-lab/schemas/conjecture-meta.schema.yaml
title: Conjecture Metadata
description: |
  Metadata for a byproduct conjecture. Applies to
  conjectures/C-###/meta.yaml.
type: object
required:
  - id
  - statement
  - parent_problem
  - parent_attempt
  - numerical_evidence_status
  - lean_status
properties:
  id:
    type: string
    pattern: '^C-\d{3}$'
  statement:
    type: string
    minLength: 8
    description: One-line natural-language or LaTeX statement.
  parent_problem:
    type: string
    enum:
      - 01-poincare
      - 02-riemann
      - 03-p-vs-np
      - 04-yang-mills
      - 05-navier-stokes
      - 06-hodge
      - 07-bsd
  parent_attempt:
    type: string
    pattern: '^A\d{3}$'
  numerical_evidence_status:
    type: string
    enum: [none, partial, strong, contradicted]
  lean_status:
    type: string
    enum: [none, partial, complete]
  references:
    type: array
    items:
      type: object
      required: [kind, ref]
      properties:
        kind: { type: string, enum: [paper, attempt, candidate, bridge, web] }
        ref:  { type: string, minLength: 1 }
    default: []
additionalProperties: false
