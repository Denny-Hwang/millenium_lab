$id: https://millennium-lab/schemas/bridge-meta.schema.yaml
title: Bridge Metadata
description: |
  Metadata for an inter-field bridge. Applies to the YAML front matter
  of bridges/B-###-<slug>.md.
type: object
required:
  - id
  - domains
  - problems
  - maturity
  - status
properties:
  id:
    type: string
    pattern: '^B-\d{3}$'
  domains:
    type: array
    minItems: 2
    items:
      type: string
      minLength: 2
    description: The two endpoint fields. Example [analytic-number-theory, random-matrix-theory].
  problems:
    type: array
    items:
      type: string
      enum:
        - 01-poincare
        - 02-riemann
        - 03-p-vs-np
        - 04-yang-mills
        - 05-navier-stokes
        - 06-hodge
        - 07-bsd
    description: Target problems this bridge connects to, directly or indirectly.
    default: []
  maturity:
    type: string
    enum: [established, emerging, speculative, ai-discovered]
  key_figures:
    type: array
    items: { type: string }
    default: []
    description: People who made essential contributions to this bridge.
  status:
    type: string
    enum: [active, dormant, retracted]
additionalProperties: false
