name: claim-integrity

on:
  pull_request:
    paths:
      - 'candidates/**'

jobs:
  check-claims:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect QED without verified Lean main-proof
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            # candidate directory
            dir="$(dirname "$f")"
            # does main-proof.md contain QED or "proof complete"?
            if grep -qiE '\b(QED|proof complete)\b' "$f"; then
              # check for main-proof.lean
              if [[ ! -f "$dir/main-proof.lean" ]]; then
                echo "::error file=$f::main-proof.md contains QED / proof complete but $dir/main-proof.lean is missing"
                fail=1
                continue
              fi
              # is meta.yaml's verification_status.L3 == pass?
              meta="$dir/meta.yaml"
              if [[ ! -f "$meta" ]]; then
                echo "::error file=$f::meta.yaml is missing"
                fail=1
                continue
              fi
              if ! grep -qE '^[[:space:]]*L3:[[:space:]]*pass\b' "$meta"; then
                echo "::error file=$meta::when QED is used, verification_status.L3 must be pass"
                fail=1
              fi
            fi
          done < <(find candidates -mindepth 2 -maxdepth 2 -name 'main-proof.md' -type f)
          if [[ $fail -ne 0 ]]; then
            echo "claim-integrity violation: see messages above." >&2
            exit 1
          fi
          echo "OK: claim-integrity passed"
      - name: Block edits to frozen transcripts and external reviews
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          if [[ -z "$base_sha" ]]; then
            echo "not a PR context — skipping"
            exit 0
          fi
          changed=$(git diff --name-only "$base_sha"...HEAD || true)
          violation=0
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              attempts/*/A*/transcript.md)
                echo "::error file=$path::merged attempts' transcript.md is immutable"
                violation=1
                ;;
              candidates/*/reviews/*)
                echo "::error file=$path::candidates/*/reviews is frozen after merge"
                violation=1
                ;;
              reviews/external/*)
                echo "::error file=$path::reviews/external is frozen after merge"
                violation=1
                ;;
              reviews/publication-track/*)
                echo "::error file=$path::reviews/publication-track is frozen after merge"
                violation=1
                ;;
            esac
          done <<< "$changed"
          if [[ $violation -ne 0 ]]; then
            exit 1
          fi
          echo "OK: no frozen-area violations"
