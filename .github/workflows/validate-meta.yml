name: validate-meta

on:
  pull_request:
    paths:
      - 'attempts/**'
      - 'candidates/**'
      - 'conjectures/**'
      - 'bridges/**'
      - 'schemas/**'
      - 'scripts/validate-meta.py'
  push:
    branches: [main]
    paths:
      - 'attempts/**'
      - 'candidates/**'
      - 'conjectures/**'
      - 'bridges/**'
      - 'schemas/**'
      - 'scripts/validate-meta.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema
      - name: Validate metadata
        run: python scripts/validate-meta.py
